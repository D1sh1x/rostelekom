services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345678
      POSTGRES_DB: skillstracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d skillstracker"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./BackendSkillTracker
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      CONFIG_PATH: /app/config/config.yaml
    ports:
      - "8081:8080"
    restart: always
    volumes:
      - ./BackendSkillTracker/config:/app/config
      - ./BackendSkillTracker/uploads:/app/uploads
      - ./BackendSkillTracker/logs:/app/logs

  frontend:
    build:
      context: ./FrontendSkillTracker
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    restart: always
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./BackendSkillTracker/config/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: always

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    volumes:
      - ./BackendSkillTracker/config/loki-config.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    restart: always

  promtail:
    image: grafana/promtail:latest
    volumes:
      - ./BackendSkillTracker/config/promtail-config.yml:/etc/promtail/config.yml
      - ./BackendSkillTracker/logs:/app/logs
    command: -config.file=/etc/promtail/config.yml
    restart: always

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    volumes:
      - ./BackendSkillTracker/config/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
      - loki
    restart: always

volumes:
  pgdata:
