basePath: /api/v1
definitions:
  dto.AttachmentResponse:
    properties:
      file_name:
        type: string
      file_size:
        type: integer
      id:
        type: integer
      task_id:
        type: integer
      uploaded_at:
        type: string
    type: object
  dto.CommentRequest:
    properties:
      task_id:
        type: integer
      text:
        type: string
    required:
    - task_id
    - text
    type: object
  dto.CommentResponse:
    properties:
      created_at:
        type: string
      id:
        type: integer
      task_id:
        type: integer
      text:
        type: string
      user_id:
        type: integer
    type: object
  dto.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  dto.LoginResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  dto.RefreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  dto.TaskHistoryResponse:
    properties:
      changed_by:
        type: integer
      created_at:
        type: string
      id:
        type: integer
      new_status:
        type: string
      old_status:
        type: string
      task_id:
        type: integer
    type: object
  dto.TaskRequest:
    properties:
      deadline:
        type: string
      description:
        type: string
      employee_id:
        type: integer
      progress:
        maximum: 100
        minimum: 0
        type: integer
      status:
        enum:
        - pending
        - in_progress
        - completed
        type: string
      title:
        minLength: 3
        type: string
    required:
    - deadline
    - employee_id
    - title
    type: object
  dto.TaskResponse:
    properties:
      created_at:
        type: string
      creator_id:
        type: integer
      deadline:
        type: string
      description:
        type: string
      employee_id:
        type: integer
      id:
        type: integer
      progress:
        type: integer
      status:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
  dto.UserRequest:
    properties:
      name:
        type: string
      password:
        minLength: 6
        type: string
      role:
        enum:
        - manager
        - employee
        type: string
      username:
        minLength: 3
        type: string
    required:
    - name
    - password
    - role
    - username
    type: object
  dto.UserResponse:
    properties:
      id:
        type: integer
      name:
        type: string
      role:
        type: string
      username:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API Server for SkillTracker Application
  title: SkillTracker API
  version: "1.0"
paths:
  /comments:
    post:
      consumes:
      - application/json
      description: Add a comment to a task
      parameters:
      - description: Comment request
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/dto.CommentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.CommentResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Create a new comment
      tags:
      - comments
  /comments/{id}:
    delete:
      description: Remove a comment from a task
      parameters:
      - description: Comment ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Delete comment
      tags:
      - comments
    put:
      consumes:
      - application/json
      description: Update the text of a comment
      parameters:
      - description: Comment ID
        in: path
        name: id
        required: true
        type: integer
      - description: Update request
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/dto.CommentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Update comment
      tags:
      - comments
  /login:
    post:
      consumes:
      - application/json
      description: Authenticate user and return JWT token
      parameters:
      - description: Login request
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LoginResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: User login
      tags:
      - auth
  /logout:
    post:
      description: Invalidate the refresh token
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Logout user
      tags:
      - auth
  /refresh:
    post:
      consumes:
      - application/json
      description: Get new access and refresh tokens using a valid refresh token
      parameters:
      - description: Refresh request
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LoginResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Refresh access token
      tags:
      - auth
  /tasks:
    get:
      description: Retrieve a list of tasks with filtering options
      parameters:
      - description: Status filter
        in: query
        name: status
        type: string
      - description: Employee ID filter
        in: query
        name: employee_id
        type: integer
      - description: Creator ID filter
        in: query
        name: creator_id
        type: integer
      - description: Search term
        in: query
        name: search
        type: string
      - description: From date (YYYY-MM-DD)
        in: query
        name: from_date
        type: string
      - description: To date (YYYY-MM-DD)
        in: query
        name: to_date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.TaskResponse'
            type: array
      security:
      - ApiKeyAuth: []
      summary: List tasks with filters
      tags:
      - tasks
    post:
      consumes:
      - application/json
      description: Assign a new task to an employee
      parameters:
      - description: Task request
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/dto.TaskRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.TaskResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Create a new task
      tags:
      - tasks
  /tasks/{id}:
    delete:
      description: Remove a task from the system
      parameters:
      - description: Task ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Delete task
      tags:
      - tasks
    get:
      description: Retrieve details of a specific task
      parameters:
      - description: Task ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.TaskResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get task by ID
      tags:
      - tasks
    put:
      consumes:
      - application/json
      description: Update task details (status, progress, etc.)
      parameters:
      - description: Task ID
        in: path
        name: id
        required: true
        type: integer
      - description: Update request
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/dto.TaskRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Update task
      tags:
      - tasks
  /tasks/{id}/attachments:
    post:
      consumes:
      - multipart/form-data
      description: Upload a file and attach it to a task
      parameters:
      - description: Task ID
        in: path
        name: id
        required: true
        type: integer
      - description: File to upload
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.AttachmentResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Upload task attachment
      tags:
      - tasks
  /tasks/{id}/history:
    get:
      description: Retrieve a list of all status changes for a task
      parameters:
      - description: Task ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.TaskHistoryResponse'
            type: array
      security:
      - ApiKeyAuth: []
      summary: Get task status history
      tags:
      - tasks
  /tasks/{task_id}/comments:
    get:
      description: Retrieve all comments for a specific task
      parameters:
      - description: Task ID
        in: path
        name: task_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.CommentResponse'
            type: array
      security:
      - ApiKeyAuth: []
      summary: Get comments by task ID
      tags:
      - comments
  /tasks/my:
    get:
      description: Retrieve tasks assigned to or created by the current user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.TaskResponse'
            type: array
      security:
      - ApiKeyAuth: []
      summary: Get my tasks
      tags:
      - tasks
  /users:
    get:
      description: Retrieve a list of all users (Manager only)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.UserResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get all users
      tags:
      - users
    post:
      consumes:
      - application/json
      description: Register a new user (Manager only)
      parameters:
      - description: User request
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/dto.UserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UserResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Create a new user
      tags:
      - users
  /users/{id}:
    delete:
      description: Remove a user from the system (Manager only)
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Delete user
      tags:
      - users
    get:
      description: Retrieve details of a specific user (Manager only)
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UserResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get user by ID
      tags:
      - users
    put:
      consumes:
      - application/json
      description: Update user details (Manager only)
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      - description: Update request
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/dto.UserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Update user
      tags:
      - users
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
